name: 🛠️ Task
description: 로엔 프로젝트 작업 이슈
title: "[DOMAIN] "
labels: []
body:
  - type: dropdown
    id: domain
    attributes:
      label: 도메인
      options:
        - GLOBAL
        - USER
        - OBS
        - BIBLE
        - CHALLENGE
        - FAITH_NOTE
        - BOT
        - INFRA
    validations:
      required: true

  - type: textarea
    id: overview
    attributes:
      label: 📋 작업 개요
      placeholder: 이 이슈에서 무엇을 하는지 한 줄로 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: ✅ 작업 상세
      value: |
        - [ ] 
        - [ ] 
        - [ ]
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 🔗 관련 정보
      value: |
        - **참고 문서:** 
        - **의존 이슈:** #

  - type: checkboxes
    id: done
    attributes:
      label: 🧪 완료 조건 (Definition of Done)
      options:
        - label: 코드 작성 완료
        - label: dev 브랜치 PR 생성
        - label: 코드 리뷰 완료

  - type: textarea
    id: review_note
    attributes:
      label: 📝 리뷰어 노트
      placeholder: 리뷰 시 봐줬으면 하는 포인트를 남겨주세요.
